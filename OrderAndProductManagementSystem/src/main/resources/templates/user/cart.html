<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Cart</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div
th:replace="~{fragments/user-navbar :: navbar('Cart')}"></div>

<div class="container mt-4">

<h2>Shopping Cart</h2>

<table class="table table-bordered">

<thead class="table-dark">

<tr>

<th>Product</th>

<th>Price</th>

<th>Quantity</th>

<th>Total</th>

<th>Action</th>

</tr>

</thead>

<tbody>

<tr
th:each="item : ${cart.cartItems}">

<td th:text="${item.product.name}"></td>

<td th:text="${item.product.price}"></td>

<td>

<form
th:action="@{/cart/items/{id}(id=${item.id})}"
method="post"
class="d-flex">

<input
type="hidden"
name="_method"
value="put">

<input
type="number"
name="quantity"
th:value="${item.quantity}"
min="1"
class="form-control me-2">

<button
class="btn btn-warning">

Update

</button>

</form>

</td>

<td
th:text="${item.product.price * item.quantity}">
</td>

<td>

<form
th:action="@{/cart/items/{id}(id=${item.id})}"
method="post">

<input
type="hidden"
name="_method"
value="delete">

<button
class="btn btn-danger">

Remove

</button>

</form>

</td>

</tr>

</tbody>

</table>

<div class="text-end">

<form
th:action="@{/orders}"
method="post">

<button
class="btn btn-success btn-lg">

Place Order

</button>

</form>

</div>

</div>

</body>

</html>
