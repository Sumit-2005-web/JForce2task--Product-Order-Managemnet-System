<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div th:replace="~{fragments/admin-navbar :: navbar('Admin Dashboard')}"></div>

<div class="container mt-4">

    <div class="d-flex justify-content-between mb-3">

        <h2>Products</h2>

        <a th:href="@{/admin/products/new}"
           class="btn btn-success">

            Add Product

        </a>

    </div>

    <table class="table table-bordered table-hover">

        <thead class="table-dark">

        <tr>

            <th>ID</th>

            <th>Name</th>

            <th>Description</th>

            <th>Price</th>

            <th>Quantity</th>

            <th>Status</th>

            <th>Action</th>

        </tr>

        </thead>

        <tbody>

        <tr th:each="product : ${products}">

            <td th:text="${product.id}"></td>

            <td th:text="${product.name}"></td>

            <td th:text="${product.description}"></td>

            <td th:text="${product.price}"></td>

            <td th:text="${product.quantity}"></td>

            <td>

                <span
                        class="badge bg-success"
                        th:if="${product.enabled}">

                    Enabled

                </span>

                <span
                        class="badge bg-danger"
                        th:unless="${product.enabled}">

                    Disabled

                </span>

            </td>

            <td>

                <a
                        th:href="@{/admin/products/{id}/edit(id=${product.id})}"
                        class="btn btn-warning btn-sm">

                    Edit

                </a>

                <form
                        th:if="${product.enabled}"
                        th:action="@{/admin/products/{id}/disable(id=${product.id})}"
                        method="post"
                        class="d-inline">

                    <input
                            type="hidden"
                            name="_method"
                            value="patch">

                    <button
                            class="btn btn-danger btn-sm">

                        Disable

                    </button>

                </form>

                <form
                        th:unless="${product.enabled}"
                        th:action="@{/admin/products/{id}/enable(id=${product.id})}"
                        method="post"
                        class="d-inline">

                    <input
                            type="hidden"
                            name="_method"
                            value="patch">

                    <button
                            class="btn btn-success btn-sm">

                        Enable

                    </button>

                </form>

            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>

</html>
